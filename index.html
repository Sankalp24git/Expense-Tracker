<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <!-- <script
      src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js"
      integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script> -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Expense Tracker</title>
  </head>
  <body>
    <div class="container">
      <h1 class="text-center mt-5">Expense Tracker</h1>
      <h2 class="text-center">Your Balance</h2>
      <h3 class="balance text-center">₹50000</h3>
    </div>
    <hr />
    <div class="d-flex flex-column align-items-center justify-content-center">
      <div class="w-50 d-flex align-items-center justify-content-between">
        <h2>Income</h2>
        <h2>Expenses</h2>
      </div>
      <div class="w-50 d-flex align-items-center justify-content-between">
        <h2 class="text-success income">₹50000</h2>
        <h2 class="text-danger expense">₹50000</h2>
      </div>
    </div>
    <hr />
    <div class="d-flex flex-column align-items-center justify-content-center">
      <h2>History</h2>
      <h2>Add New Transaction</h2>
      <div class="w-75 mt-3 table-responsive">
        <table class="table table-striped text-center">
          <thead>
            <tr>
              <th>Title</th>
              <th>Amount</th>
              <th>Transaction</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody class="t-list">
            <!-- <tr>
              <td class="text-nowrap">Course Fee</td>
              <td class="text-nowrap">5000</td>
              <td class="text-nowrap">cr</td>
              <td class="text-nowrap">12-08-2000</td>
              <td class="text-nowrap">
                <button class="btn text-success">
                  <i class="fa fa-pen"></i>
                </button>
                <button class="btn text-danger">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr> -->
          </tbody>
        </table>
      </div>
      <button
        data-bs-toggle="modal"
        data-bs-target="#myModal"
        class="btn modal-btn bg-primary text-white rounded-circle position-absolute end-0 bottom-0"
        style="margin: 40px"
      >
        <i class="fa fa-plus"></i>
      </button>
    </div>
    <div class="modal" id="myModal">
      <div
        class="animate__animated animate__zoomIn modal-dialog modal-dialog-centered"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h3>Add Your Transaction</h3>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form class="t-form">
              <select class="form-select mb-3">
                <option value="transaction" hidden>Transaction</option>
                <option value="cr">CR</option>
                <option value="dr">DR</option>
              </select>
              <input
                required
                type="text"
                placeholder="Title"
                class="form-control mb-3"
              />
              <input
                required
                type="number"
                placeholder="Amount"
                class="form-control mb-3"
              />
              <button type="submit" class="btn btn-primary text-white w-100">
                Submit
              </button>
              <button
                type="button"
                class="d-none btn btn-danger text-white w-100"
              >
                Update
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
